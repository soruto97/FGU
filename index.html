<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミニマッチ！</title>
  <style>
    :root {
      --primary-bg: #ffffff;
      --secondary-bg: #f7f7f7;
      --text-color: #333333;
      --border-color: #000000;
      --error-color: #d9534f;
      --success-color: #5cb85c;
      --info-color: #007bff;
      --button-disabled-bg: #cccccc;
      --font-family: 'Helvetica Neue', Arial, sans-serif;
      --slider-track-bg: #ddd;
      --slider-thumb-bg: #333;
      --hp-high: #4caf50;
      --hp-medium: #ffc107;
      --hp-low: #f44336;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--secondary-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-color);
      padding: 1rem;
      box-sizing: border-box;
    }

    #root {
      background-color: var(--primary-bg);
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
      text-align: center;
    }
    
    h1, h2 {
      margin-top: 0;
    }

    .stat-screen-description {
      font-size: 0.9rem;
      color: #666;
      margin-top: -0.5rem;
      margin-bottom: 1.5rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1.2rem;
      align-items: center;
      text-align: left;
    }

    label {
      font-size: 1.5rem;
      font-weight: bold;
    }

    input[type="text"],
    input[type="number"],
    select {
      border: 2px solid var(--border-color);
      padding: 0.75rem;
      font-size: 1.2rem;
      border-radius: 6px;
      width: 100%;
      box-sizing: border-box;
      background-color: white;
    }
    
    input[type="number"] {
      text-align: right;
    }

    .stat-grid .name-label {
      grid-column: 1 / 2;
    }
    .stat-grid .name-input {
      grid-column: 2 / 3;
    }

    .item-selector-container {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 1.2rem;
        align-items: center;
        text-align: left;
        margin-top: 2rem;
    }
    
    .item-selector-container label {
        font-size: 1.5rem;
        font-weight: bold;
    }

    .item-description {
        grid-column: 1 / 3;
        text-align: center;
        font-size: 0.9rem;
        color: #666;
        margin: 0.5rem 0 0 0;
    }
    
    .attack-pattern-container {
      margin-top: 2rem;
    }
    
    .attack-pattern-screen-container {
      position: relative;
      padding-bottom: 50px; /* Space for the back button */
    }

    .attack-name-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 1.2rem;
      align-items: center;
      text-align: left;
      margin-top: 2rem;
      margin-bottom: 2rem;
    }
    
    .attack-name-grid label {
        font-size: 1.2rem;
    }

    .attack-pattern-display {
      display: flex;
      justify-content: space-around;
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 2rem;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 15px;
      border-radius: 5px;
      background: var(--slider-track-bg);
      outline: none;
      opacity: 0.7;
      -webkit-transition: .2s;
      transition: opacity .2s;
    }

    input[type="range"]:hover {
      opacity: 1;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: var(--slider-thumb-bg);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: var(--slider-thumb-bg);
      cursor: pointer;
    }

    .total-points {
      margin-top: 2rem;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .error-message {
      color: var(--error-color);
      font-weight: bold;
      margin-top: 0.5rem;
    }

    .confirm-button, .start-button, .attack-button, .reset-button {
      background-color: var(--text-color);
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 2rem;
      transition: background-color 0.2s, transform 0.2s;
      width: 100%;
    }
    
    .confirm-button:hover:not(:disabled), .start-button:hover, .attack-button:hover:not(:disabled), .reset-button:hover {
        background-color: #555;
        transform: translateY(-2px);
    }
    
    .attack-button, .reset-button {
      background-color: var(--success-color);
    }
    .attack-button:hover:not(:disabled), .reset-button:hover {
      background-color: #4a9d4a;
    }

    .confirm-button:disabled, .attack-button:disabled {
      background-color: var(--button-disabled-bg);
      cursor: not-allowed;
      transform: none;
    }

    .back-button {
      position: absolute;
      left: 0;
      bottom: 0;
      background-color: #6c757d;
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: normal;
      transition: background-color 0.2s;
      width: auto;
    }

    .back-button:hover {
      background-color: #5a6268;
      transform: none;
    }
    
    .random-button {
      background-color: transparent;
      color: #666;
      border: 1px solid #ccc;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 1rem;
      margin-left: auto;
      display: block;
      transition: all 0.2s;
    }
    
    .random-button:hover {
      background-color: #eee;
      color: #333;
      border-color: #999;
    }

    .battle-screen-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .players-display {
      display: flex;
      justify-content: space-around;
      gap: 1rem;
      width: 100%;
      margin-top: 2rem;
    }

    .player-info-card {
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      width: 45%;
      text-align: center;
      background-color: var(--secondary-bg);
    }
    
    .player-info-card h2 {
        margin-top: 0;
        font-size: 1.5rem;
        word-break: break-all;
    }

    .player-info-card p {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
    }

    .player-item {
        font-size: 1rem !important;
        margin-top: 1rem;
        margin-bottom: 0 !important;
        font-weight: normal !important;
        color: var(--info-color);
    }

    .hp-bar-container {
      width: 100%;
      height: 20px;
      background-color: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    .hp-bar {
      height: 100%;
      border-radius: 10px 0 0 10px;
      transition: width 0.5s ease-in-out, background-color 0.5s ease-in-out;
    }
    
    .battle-log-container {
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 2rem;
      width: 100%;
      height: 150px;
      overflow-y: auto;
      text-align: left;
      background-color: var(--secondary-bg);
      font-family: monospace;
    }

    .log-message {
      margin-bottom: 0.5rem;
    }
    .log-message:last-child {
      margin-bottom: 0;
    }
    
    .winner-announcement {
      font-size: 2rem;
      font-weight: bold;
      color: var(--success-color);
      margin-top: 2rem;
    }

    .auto-battle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      font-size: 1.2rem;
      gap: 0.5rem;
    }

    .auto-battle-container input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    .winner-stats-container {
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      margin-bottom: -1rem;
      width: 100%;
      max-width: 450px;
      box-sizing: border-box;
      background-color: var(--secondary-bg);
      text-align: left;
    }

    .winner-stats-container h3 {
      text-align: center;
      margin-top: 0;
      font-size: 1.5rem;
    }

    .winner-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem 2rem;
    }
    
    .winner-stats-grid div {
      font-size: 1.1rem;
    }

    .winner-stats-grid span {
      font-weight: bold;
    }
    
    .winner-attack-pattern {
      text-align: center;
      margin-top: 1rem;
      font-weight: bold;
      line-height: 1.5;
    }

    .stat-label-interactive {
      position: relative;
      cursor: help;
      user-select: none;
    }

    .tooltip {
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--text-color);
      color: var(--primary-bg);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      z-index: 10;
      width: max-content;
      max-width: 220px;
      font-size: 1rem;
      font-weight: normal;
      text-align: left;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      pointer-events: none;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: var(--text-color) transparent transparent transparent;
    }
    
    .log-details-toggle {
      cursor: pointer;
      color: #888888;
      font-weight: bold;
      margin-left: 0.5rem;
      user-select: none;
      display: inline-block;
    }
    .log-details-toggle:hover {
      text-decoration: underline;
    }

    .log-details-content {
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.75rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #333;
      font-family: var(--font-family);
    }

    .log-details-content p {
      margin: 0.25rem 0;
    }

    .log-details-content ul {
      margin: 0.25rem 0;
      padding-left: 1.5rem;
    }

    .log-details-content b {
      color: #000;
    }

    .log-details-content p u {
        text-decoration: none;
        border-bottom: 1px solid #555;
        font-weight: bold;
    }

    .mute-button {
      position: absolute;
      top: 0;
      right: 0;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      transition: background-color 0.2s;
      z-index: 10;
    }

    .mute-button:hover {
      background-color: #e0e0e0;
    }

  </style>
<script type="importmap">

  }
}
</script>

</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
